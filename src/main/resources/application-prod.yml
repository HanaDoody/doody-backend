spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:5432/${DB_NAME}?sslmode=require
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

server:
  port: 8080

cloud:
  aws:
    region:
      static: ${AWS_REGION}
    s3:
      bucket: ${S3_BUCKET}
      public-base-url: ${S3_PUBLIC_BASE_URL:}
hana:
  finance:
    autonomy-url: ${HANA_AUTONOMY_URL:https://www.hanafn.com}
    connection-url: ${HANA_CONNECTION_URL:https://www.hanafn.com}
ai:
  engine:
    base-url: ${AI_ENGINE_BASE_URL:}
